<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | Kazakhstan Chronicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="article-page">
  <div class="paper-wrapper">
    <header class="masthead">
      <div class="masthead-top">
        <span class="edition" id="edition-num">Live</span>
        <span class="date-line" id="date-line"></span>
        <span class="price">KZ</span>
      </div>
      <div class="lang-switcher" id="lang-switcher" aria-label="Language"></div>
      <div class="masthead-rule thick"></div>
      <h1 class="paper-title">
        <a href="index.html" style="text-decoration:none;color:inherit;">
          <span class="title-main" id="site-title">Kazakhstan Chronicle</span>
          <span class="title-sub" id="site-sub">KAZAKHSTAN CHRONICLE</span>
        </a>
      </h1>
      <div class="masthead-rule thin"></div>
    </header>

    <main id="article-content">
      <p id="loading-text">Loading…</p>
    </main>

    <footer class="paper-footer">
      <div class="masthead-rule"></div>
      <p id="footer-text"></p>
    </footer>
  </div>

  <button class="font-size-toggle" id="font-toggle" aria-label="Font size" title="Font size">A</button>

  <script src="js/i18n.js"></script>
  <script src="js/translate.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
