<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kazakhstan Chronicle — multilingual news in newspaper style">
  <title>Kazakhstan Chronicle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="paper-wrapper">
    <header class="masthead">
      <div class="masthead-top">
        <span class="edition" id="edition-num">Live</span>
        <span class="date-line" id="date-line"></span>
        <span class="price" id="news-updated">…</span>
      </div>
      <div class="lang-switcher" id="lang-switcher" aria-label="Language"></div>
      <div class="masthead-rule thick"></div>
      <h1 class="paper-title">
        <span class="title-main" id="site-title">Kazakhstan Chronicle</span>
        <span class="title-sub" id="site-sub">KAZAKHSTAN CHRONICLE</span>
      </h1>
      <p class="tagline" id="site-tagline"></p>
      <div class="masthead-rule"></div>
      <nav class="section-nav" aria-label="Sections">
        <a href="#front-page" class="active" id="nav-front">Front</a>
        <a href="#politics" id="nav-politics">Politics</a>
        <a href="#economy" id="nav-economy">Economy</a>
        <a href="#culture" id="nav-culture">Culture</a>
        <a href="#sports" id="nav-sports">Sports</a>
        <a href="#more-news" id="nav-more">More</a>
      </nav>
      <div class="masthead-rule thin"></div>
    </header>

    <main id="front-page">
      <div class="loading-state" id="loading-state">
        <p id="loading-text">Loading…</p>
      </div>
      <article class="lead-story" id="lead-story"></article>
      <hr class="section-divider">
      <section class="story-grid" id="story-grid"></section>
      <hr class="section-divider ornamental">
      <section class="inner-page">
        <div class="inner-columns">
          <article class="column-story" id="sports">
            <h3 class="headline-sm" id="sports-head">Sports</h3>
            <div class="rule-short"></div>
            <div id="sports-column"><p>…</p></div>
          </article>
          <article class="column-story">
            <h3 class="headline-sm" id="society-head">Society</h3>
            <div class="rule-short"></div>
            <div id="society-column"><p>…</p></div>
          </article>
          <article class="column-story">
            <h3 class="headline-sm" id="weather-head">Weather</h3>
            <div class="rule-short"></div>
            <div id="weather-column" class="weather-report"><p>…</p></div>
          </article>
        </div>
      </section>
      <section class="more-news" id="more-news">
        <h3 class="classifieds-title" id="more-news-title">More News</h3>
        <div class="masthead-rule thin"></div>
        <div class="more-news-list" id="more-news-list"></div>
      </section>
    </main>

    <footer class="paper-footer">
      <div class="masthead-rule"></div>
      <p id="footer-text"></p>
      <p class="footer-note" id="footer-note"></p>
    </footer>
  </div>

  <button class="font-size-toggle" id="font-toggle" aria-label="Font size" title="Font size">A</button>
  <button class="refresh-toggle" id="refresh-toggle" aria-label="Refresh" title="Refresh">↻</button>

  <script src="js/i18n.js"></script>
  <script src="js/translate.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
