<!DOCTYPE html>
<html lang="zh-CN">

<body>
  <div class="paper-wrapper">
    <header class="masthead">
      <div class="masthead-top">
        <span class="edition" id="edition-num">实时版</span>
        <span class="date-line" id="date-line"></span>

      <div class="masthead-rule thick"></div>

        <span class="title-main">哈萨克纪闻</span>

      <nav class="section-nav" aria-label="版面导航">

      <hr class="section-divider ornamental">

      <section class="inner-page">
        <div class="inner-columns">
          <article class="column-story" id="sports">
            <h3 class="headline-sm">体坛快讯</h3>
            <div class="rule-short"></div>
            <div id="sports-column"><p>加载中…</p></div>
          </article>

          <article class="column-story">
            <h3 class="headline-sm">社会见闻</h3>
            <div class="rule-short"></div>
            <div id="society-column"><p>加载中…</p></div>
          </article>

          <article class="column-story">

            <div class="rule-short"></div>
            <div id="weather-column" class="weather-report"><p>加载中…</p></div>

      </section>

      <section class="more-news" id="more-news">

        <div class="masthead-rule thin"></div>
        <div class="more-news-list" id="more-news-list"></div>

      <p class="footer-note">线上版每 6 小时自动更新 &nbsp;|&nbsp; 本地预览：<code>py server.py</code></p>
    </footer>
  </div>

  <button class="font-size-toggle" id="font-toggle" aria-label="调整字号" title="调整字号">字</button>
  <button class="refresh-toggle" id="refresh-toggle" aria-label="刷新新闻" title="刷新新闻">↻</button>

  <script src="js/main.js"></script>
</body>
</html>
